apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-manager-webhook-technitium
rules:
  - apiGroups:
      - acme.hdti.ca
    resources:
      - technitium-dns
    verbs:
      - create
      - patch
      - delete
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-webhook-technitium
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-manager-webhook-technitium
subjects:
  - name: cert-manager
    namespace: cert-manager
    kind: ServiceAccount