apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-manager-technitium-dns
rules:
- apiGroups: ["acme.hdti.ca"]
  resources: ["technitium-dns"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-technitium-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-manager-technitium-dns
subjects:
- kind: ServiceAccount
  name: cert-manager
  namespace: cert-manager