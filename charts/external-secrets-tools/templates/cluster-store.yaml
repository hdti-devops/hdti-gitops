apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault
  namespace: external-secrets
spec:
  provider:
    vault:
      server: "{{ .Values.vault.server }}"
      path: "{{ .Values.vault.path }}"
      version: "{{ .Values.vault.version }}"
      auth:
        appRole:
          path: "{{ .Values.vault.approlePath }}"
          # FIX: roleId must be a string value, not a secretRef
          roleId: "{{ .Values.vault.roleIdValue }}" 
          secretRef:
            name: "{{ .Values.vault.secretName }}"
            key: "{{ .Values.vault.secretKeySecretId }}"
            namespace: "{{ .Values.vault.secretNamespace }}"