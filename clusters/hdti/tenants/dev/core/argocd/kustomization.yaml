apiVersion: kustomize.config.k8s.io/v1beta1 
kind: Kustomization 

helmCharts: 
  - name: argo-cd 
    namespace: argocd 
    releaseName: argocd 
    repo: https://argoproj.github.io/argo-helm 
    version: 9.4.15 
    includeCRDs: true
    valuesInLine:
      global:
        domain: argocd.k8s.hdti.ca
      configs:
        cm:
          kustomize.buildOptions: "--enable-helm --load-restrictor LoadRestrictionsNone"
        params:
          server.insecure: "true"
      server:
        ingress:
          enabled: true
          controller: "generic"
          ingressClassName: "nginx"
          annotations:
            cert-manager.io/cluster-issuer: "selfsigned-cluster-issuer" # Matches your cert-manager requirement
            nginx.org/redirect-to-https: "true"          
          # The template uses 'hostname' to populate BOTH the rules and the TLS hosts
          hostname: "argocd.k8s.hdti.ca"    
          tls: true

            