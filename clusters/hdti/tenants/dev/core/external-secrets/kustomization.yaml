apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: external-secrets-tools
    namespace: external-secrets
    releaseName: external-secrets-tools
    path: ../../../../../../charts
    version: external-secrets-tools-v1.0.0 #release by release please
    includeCRDs: true
  - name: external-secrets
    namespace: external-secrets
    releaseName: external-secrets
    repo: https://charts.external-secrets.io
    version: 2.2.0
    includeCRDs: true