apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nginx-ingress

helmCharts:
  - name: external-secrets-tools
    namespace: external-secrets
    releaseName: external-secrets
    path: ../../../../../../charts/external-secrets-tools
    version: external-secrets-tools-v1.0.0 #release by release please
    includeCRDs: true
  - name: external-secrets
    namespace: external-secrets
    releaseName: external-secrets
    repo: https://charts.external-secrets.io
    version: 2.2.0
    includeCRDs: true