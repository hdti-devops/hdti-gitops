apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmGlobals:
  chartHome: ../../../../../../charts

helmCharts:
  - name: external-secrets
    namespace: external-secrets
    releaseName: external-secrets
    repo: https://charts.external-secrets.io
    version: 2.2.0
    includeCRDs: true
  - name: external-secrets-tools
    namespace: external-secrets
    releaseName: external-secrets-tools
    version: external-secrets-tools-v1.2.1 #release by release please
    dependencies:
      - releaseName: external-secrets