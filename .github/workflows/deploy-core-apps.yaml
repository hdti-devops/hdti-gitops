name: Deploy core Applications

run-name: Deploy core applications on ${{ inputs.cluster_name }}

on: 
  workflow_dispatch:
    inputs:
      cluster_name:
        description: 'Select the cluster to bootstrap'
        required: true
        default: 'hdti'
        type: choice
        options:
          - hdti

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bootstrap_cluster:
    runs-on: self-hosted
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Dependencies
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      # Secrets
      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: http://192.168.0.188:8200
          method: approle
          roleId: ${{ secrets.ROLEID }}
          secretId: ${{ secrets.SECRETID }} 
          secrets: |
            secrets/data/k8s/kubeconfig config | KUBECONFIG_DATA

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ env.KUBECONFIG_DATA }}

      - name: Prepare Kube-proxy for MetalLB
        run: |
          kubectl get configmap kube-proxy -n kube-system -o yaml | \
          sed -e "s/strictARP: false/strictARP: true/" | \
          kubectl apply -f - -n kube-system

      - name: Create Vault AppRole Secret
        run: |
          kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic vault-approle \
            --namespace external-secrets \
            --from-literal=roleId=${{ secrets.ESO_ROLEID }} \
            --from-literal=secretId=${{ secrets.ESO_SECRETID }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy CoreApps
        run: |
          kubectl apply -f ./clusters/${{ github.event.inputs.cluster_name }}/core-apps.yaml
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }} # Ensure the script sees the file path
