name: BootStrap Cluster

on: 
  workflow_dispatch:
    inputs:
      cluster_name:
        description: 'Select the cluster to bootstrap'
        required: true
        default: 'hdti'
        type: choice
        options:
          - hdti

jobs:
  bootstrap_cluster:
    runs-on: self-hosted
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Dependencies
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: http://192.168.0.188:8200
          method: approle
          roleId: ${{ secrets.ROLEID }}
          secretId: ${{ secrets.SECRETID }} 
          secrets: |
            secrets/data/k8s/kubeconfig config | KUBECONFIG_DATA

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ env.KUBECONFIG_DATA }}

      - name: Prepare Kubeconfig for Script
        run: |
          # 1. Disable TLS check for this runner session
          kubectl config set-cluster kubernetes --insecure-skip-tls-verify=true
          # 2. Force the KUBECONFIG path into the environment for the next step
          echo "KUBECONFIG=${{ env.KUBECONFIG }}" >> $GITHUB_ENV

      - name: BootStrap Argo
        run: |
          # Use github.event.inputs for maximum compatibility
          SCRIPT_PATH="./clusters/${{ github.event.inputs.cluster_name }}/bootstrap.sh"
          chmod +x "$SCRIPT_PATH"
          ./"$SCRIPT_PATH"
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }} # Ensure the script sees the file path
        
